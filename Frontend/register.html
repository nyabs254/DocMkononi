<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Register | DocMkononi</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />
    <!-- auth script loaded at bottom -->
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
      }

      .register-hero {
        min-height: 100vh;
        background:
          linear-gradient(rgba(13, 110, 253, 0.85), rgba(13, 110, 253, 0.85)),
          url("images/logo.png");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
      }

      .glass {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        border-radius: 22px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        animation: fadeUp 0.8s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand span {
        color: #dc2626;
      }

      .step {
        display: none;
      }
      .step.active {
        display: block;
      }

      .progress {
        height: 6px;
      }

      .strength {
        height: 6px;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <section class="register-hero">
      <div class="container">
        <div class="row align-items-center g-5">
          <!-- LEFT INFO -->

          <div class="col-lg-6 text-white d-none d-lg-block">
            <h1 class="fw-bold brand">Doc<span>Mkononi</span></h1>

            <p class="lead mt-3">Smart healthcare in your hands.</p>

            angelscript
            <ul class="list-unstyled mt-4">
              <li class="mb-2">
                <i class="fas fa-heartbeat me-2"></i> Continuous monitoring
              </li>
              <li class="mb-2">
                <i class="fas fa-eye me-2"></i> Early symptom detection
              </li>
              <li class="mb-2">
                <i class="fas fa-pills me-2"></i> Chronic disease management
              </li>
              <li>
                <i class="fas fa-shield-heart me-2"></i> Preventive healthcare
              </li>
            </ul>
          </div>

          <!-- FORM -->
          <div class="col-lg-5 mx-auto">
            <div class="glass">
              <h4 class="fw-bold text-center mb-3">Create Account</h4>

              <div class="progress mb-4">
                <div
                  id="progressBar"
                  class="progress-bar bg-primary"
                  style="width: 33%"
                ></div>
              </div>

              <form>
                <!-- STEP 1 -->
                <div class="step active">
                  <input class="form-control mb-3" placeholder="Full Name" />
                  <input class="form-control mb-3" placeholder="Email" />
                  <input
                    type="password"
                    id="password"
                    class="form-control mb-2"
                    placeholder="Password"
                  />
                  <input
                    type="password"
                    id="confirmPassword"
                    class="form-control mb-2"
                    placeholder="Confirm Password"
                  />

                  <div class="bg-light strength mb-3">
                    <div
                      id="strengthBar"
                      class="bg-danger strength"
                      style="width: 30%"
                    ></div>
                  </div>

                  <button
                    type="button"
                    class="btn btn-primary w-100"
                    onclick="nextStep()"
                  >
                    Next
                  </button>
                </div>

                <!-- STEP 2 -->
                <div class="step">
                  <select class="form-control mb-3">
                    <option>Do you have a chronic condition?</option>
                    <option>None</option>
                    <option>Diabetes</option>
                    <option>Hypertension</option>
                    <option>Asthma</option>
                  </select>

                  <input class="form-control mb-3" placeholder="Age" />
                  <input class="form-control mb-3" placeholder="Weight (kg)" />

                  <button
                    type="button"
                    class="btn btn-secondary w-100"
                    onclick="nextStep()"
                  >
                    Next
                  </button>
                </div>

                <!-- STEP 3 -->
                <div class="step">
                  <label class="mb-2 fw-semibold">Health Goals</label>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" /> Weight
                    management
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" />
                    Medication reminders
                  </div>
                  <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" /> Symptom
                    tracking
                  </div>

                  <button
                    type="button"
                    class="btn btn-primary w-100"
                    onclick="registerUser()"
                  >
                    <i class="fas fa-user-plus me-1"></i> Finish Registration
                  </button>
                </div>

                <p class="text-center mt-3">
                  Already have an account?
                  <a href="login.html">Login</a>
                </p>
                <div class="text-center">
                  <a href="final year.html" class="text-decoration-none">
                    ← Back to Home
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      let step = 0;
      const steps = document.querySelectorAll(".step");
      const bar = document.getElementById("progressBar");

      function nextStep() {
        steps[step].classList.remove("active");
        step++;
        steps[step].classList.add("active");
        bar.style.width = ((step + 1) / steps.length) * 100 + "%";
      }

      document.getElementById("password").addEventListener("input", (e) => {
        const val = e.target.value.length;
        document.getElementById("strengthBar").style.width =
          val < 6 ? "30%" : val < 10 ? "60%" : "100%";
      });
    </script>
  </body>
</html>
