<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | DocMkononi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body {
  font-family: "Segoe UI", sans-serif;
}

.login-hero {
  min-height: 100vh;
  background:
    linear-gradient(rgba(13,110,253,0.9), rgba(13,110,253,0.9)),
    url("images/logo.png");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
}

.glass {
  background: rgba(255,255,255,0.95);
  border-radius: 25px;
  padding: 2.5rem;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(40px); }
  to { opacity:1; transform:translateY(0); }
}

.brand span {
  color: #dc2626;
}

.password-toggle {
  position: absolute;
  right: 15px;
  top: 70%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #6c757d;
}
</style>
</head>

<body>

<section class="login-hero">
<div class="container">
<div class="row align-items-center g-5">

<!-- LEFT INFO -->
<div class="col-lg-6 text-white d-none d-lg-block">
  <h1 class="fw-bold brand">Doc<span>Mkononi</span></h1>
  <p class="lead mt-3">Welcome back to smart healthcare.</p>

  <ul class="list-unstyled mt-4">
    <li class="mb-2"><i class="fas fa-heartbeat me-2"></i> Track your health</li>
    <li class="mb-2"><i class="fas fa-bell me-2"></i> Medication reminders</li>
    <li class="mb-2"><i class="fas fa-chart-line me-2"></i> Health insights</li>
    <li><i class="fas fa-user-shield me-2"></i> Secure access</li>
  </ul>
</div>

<!-- LOGIN FORM -->
<div class="col-lg-4 mx-auto">
<div class="glass">
<h4 class="fw-bold text-center mb-4">Login to DocMkononi</h4>

<form id="loginForm">

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="loginEmail" class="form-control" placeholder="example@email.com" required>
</div>

<div class="mb-3 position-relative">
<label class="form-label">Password</label>
<input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
<i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
</div>

<button type="submit" class="btn btn-primary w-100">
<i class="fas fa-sign-in-alt me-1"></i> Login
</button>

<p class="text-center mt-3 mb-0">
Don’t have an account? <a href="register.html">Register</a>
</p>

</form>
</div>
</div>

</div>
</div>
</section>

<script>

/* Toggle Password */
function togglePassword(){
  const input = document.getElementById("loginPassword");
  input.type = input.type === "password" ? "text" : "password";
}

/* Login Logic */
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    const response = await fetch("http://localhost:3000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      Swal.fire({
        icon: "error",
        title: data.message || "Login failed"
      });
      return;
    }

    localStorage.setItem("sessionToken", data.token);
    localStorage.setItem("userName", data.user.name || "");
    localStorage.setItem("userEmail", data.user.email || "");

    Swal.fire({
      title: "Login Successful!",
      html: `
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div style="
            width:80px;
            height:80px;
            border-radius:50%;
            background:6367FF;
            display:flex;
            align-items:center;
            justify-content:center;
            animation: pop 0.5s ease;
          ">
            <i class="fas fa-check" style="color:white;font-size:40px;"></i>
          </div>
          <h4 style="margin-top:15px;">Welcome Back!</h4>
          <p style="color:gray;">Redirecting to your dashboard...</p>
        </div>
      `,
      showConfirmButton: false,
      timer: 1500
    });

    setTimeout(function(){
      window.location.href = "dashboard.html";
    }, 1500);
  } catch (error) {
    Swal.fire({
      icon: "error",
      title: "Server not running"
    });
  }
});
</script>

</body>
</html>
