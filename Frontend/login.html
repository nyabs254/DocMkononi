<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | DocMkononi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Icons -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
      }

      .login-hero {
        min-height: 100vh;
        background:
          linear-gradient(rgba(13, 110, 253, 0.85), rgba(13, 110, 253, 0.85)),
          url("images/logo.png");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
      }

      .glass {
        background: rgba(255, 255, 255, 0.92);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border-radius: 22px;
        padding: 2.5rem;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        animation: fadeUp 0.8s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand span {
        color: #dc2626;
      }

      .password-toggle {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #6c757d;
      }
    </style>
  </head>

  <body>
    <section class="login-hero">
      <div class="container">
        <div class="row align-items-center g-5">
          <!-- LEFT INFO -->
          <div class="col-lg-6 text-white d-none d-lg-block">
            <h1 class="fw-bold brand">Doc<span>Mkononi</span></h1>
            <p class="lead mt-3">Welcome back to smart healthcare.</p>

            <ul class="list-unstyled mt-4">
              <li class="mb-2">
                <i class="fas fa-heartbeat me-2"></i> Track your health
              </li>
              <li class="mb-2">
                <i class="fas fa-bell me-2"></i> Medication reminders
              </li>
              <li class="mb-2">
                <i class="fas fa-chart-line me-2"></i> Health insights
              </li>
              <li><i class="fas fa-user-shield me-2"></i> Secure access</li>
            </ul>
          </div>

          <!-- LOGIN FORM -->
          <div class="col-lg-4 mx-auto">
            <div class="glass">
              <h4 class="fw-bold text-center mb-4">Login to Your Account</h4>

              <form>
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    id="loginEmail"
                    class="form-control"
                    placeholder="example@email.com"
                  />
                </div>

                <div class="mb-3 position-relative">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    id="loginPassword"
                    class="form-control"
                    placeholder="Password"
                  />
                  <i
                    class="fas fa-eye password-toggle"
                    onclick="togglePassword()"
                  ></i>
                </div>

                <div
                  class="d-flex justify-content-between align-items-center mb-3"
                >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="rememberMe"
                    />
                    <label class="form-check-label" for="rememberMe"
                      >Remember me</label
                    >
                  </div>
                  <a href="#" class="small">Forgot password?</a>
                </div>

                <button
                  type="button"
                  class="btn btn-primary w-100"
                  onclick="loginUser()"
                >
                  <i class="fas fa-sign-in-alt me-1"></i> Login
                </button>
                <div class="text-center">
                  <a href="dashboard.html" class="text-decoration-none">
                    My Dashboard
                  </a>
                </div>
                <p class="text-center mb-0">
                  Don’t have an account?
                  <a href="register.html">Register</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
  </body>
</html>
